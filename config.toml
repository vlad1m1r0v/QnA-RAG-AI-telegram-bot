[llm]
model = "openai/gpt-oss-120b"
temperature = 0.2

[embeddings]
model = "intfloat/multilingual-e5-base"
device = "cpu"
vector_size = 768
embed_batch_size = 32

[qdrant]
top_k = 8
distance = "COSINE"

[scraper]
user_agent = "Mozilla/5.0 (compatible; RAGBot/1.0)"
requests_per_second = 2

[text_splitter]
chunk_size = 512
chunk_overlap = 50
separators = ["\n\n", "\n", ".", " ", ""]

[memory]
max_messages = 8
keep_messages = 4
summary_max_sentences = 5
