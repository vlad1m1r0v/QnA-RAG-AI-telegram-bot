version: "3.8"
services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    restart: always

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - ./mongodb_data:/data/db
    restart: always
